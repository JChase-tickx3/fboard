<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финансовый дашборд</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="page">

  <div class="page__layout">
    
    <aside class="sidebar">
      <div class="sidebar__logo">КапиталУчёт</div>
      <nav class="sidebar__list">
        <a href="#" class="sidebar__link sidebar__link--active" data-view="overview">Обзор</a>
        <a href="#" class="sidebar__link" data-view="transactions">Транзакции</a>
        <a href="#" class="sidebar__link" data-view="settings">Настройки</a>
      </nav>
      <button id="theme-toggle" class="button button--secondary">Светлая / Темная</button>
    </aside>

    <main class="dashboard">
      
      <header class="header">
        <h1 class="header__title" id="page-title">Обзор финансов</h1>
        <button id="btn-open-modal" class="button button--primary">Добавить транзацию</button>
      </header>

      <div id="view-overview" class="view-section">
        <section class="stats-panel">
          <div class="stats-card">
            <h3 class="stats-card__title">Общий баланс</h3>
            <div id="val-balance" class="stats-card__amount">0 ₸</div>
          </div>
          <div class="stats-card">
            <h3 class="stats-card__title">Доходы (всего)</h3>
            <div id="val-income" class="stats-card__amount stats-card__amount--positive">0 ₸</div>
          </div>
          <div class="stats-card">
            <h3 class="stats-card__title">Расходы (всего)</h3>
            <div id="val-expense" class="stats-card__amount stats-card__amount--negative">0 ₸</div>
          </div>
        </section>
      </div>

      <div id="view-transactions" class="view-section" style="display: none;">
        <section class="transaction-module">
          <div class="transaction-module__controls">
            <form id="filter-form" class="filter-form">
              <div class="filter-form__group">
                <label class="filter-form__label">Тип операции</label>
                <select id="filter-type" class="form-input form-input--select">
                  <option value="all">Все типы</option>
                  <option value="income">Доход</option>
                  <option value="expense">Расход</option>
                </select>
              </div>

              <div class="filter-form__group">
                <label class="filter-form__label">Категория</label>
                <select id="filter-category" class="form-input form-input--select">
                  <option value="all">Все категории</option>
                </select>
              </div>

              <div class="filter-form__group">
                <label class="filter-form__label">Поиск</label>
                <input type="text" id="filter-search" class="form-input" placeholder="Поиск по категории...">
              </div>
            </form>
          </div>
